# General
application.name=Spring AI マルチモデルチャット

# Error messages
error.api-key-missing=APIキーの設定がありません。application.yaml で spring.ai.{0}.api-key を設定してください
error.base-url-missing=API ベース URL の設定がありません。application.yaml で spring.ai.{0}.base-url を設定してください
error.unsupported-model=サポートされていないモデル: {0}
error.runtime-error=ランタイムエラー: {0}
error.read-input-error=入力の読み取りエラー: {0}

# Chat controller
error.chat-api.request-message-required=メッセージは必須です

# Demo runner
demorunner.error.no-chatclient-found=エラー: 利用可能な ChatClient Bean が見つかりません。API キーとモデルの設定が正しく設定されていることを確認してください。
demorunner.error.unsupported-model=サポートされていないモデル: {0}
demorunner.warning.model-not-found=警告: モデル '{0}' が見つかりません。デフォルトモデルを使用します
demorunner.info.non-interactive-environment=ヒント: 非対話環境が検出されました。コマンドラインインタラクションではなく REST API を使用することをお勧めします
demorunner.info.exit=さようなら!
demorunner.info.model-switched=切り替えました: {0}
demorunner.info.language-switched=言語を切り替えました: {0}

# Commands
command.list-header=サポートされているモデル:
command.help-header=サポートされているコマンド:
command.help.exit=exit - プログラムを終了します
command.help.list=/list - サポートされているモデルを表示します
command.help.help=/help または /? - このヘルプメッセージを表示します
command.help.model=model <name> - モデルを切り替えます（例: model qwen）
command.help.lang=lang <code> - 言語を切り替えます（例: lang en）

# Model display names
model.deepseek=DeepSeek
model.qwen=通義千問 (Qwen)
model.qwen3-coder-next=通義千問3 コードエキスパート (Qwen3 Coder Next)
model.default=デフォルト

# CLI prompt
cli.prompt=>
cli.input-prompt=メッセージを入力してください:
cli.exit=exit
cli.list=list
cli.model-switch=model
cli.lang-switch=lang

# CLI welcome message
cli.welcome-title=== Spring AI チャットデモ ===
cli.welcome-model=使用中のモデル:
cli.welcome-exit-command='exit' を入力して終了
cli.welcome-list-command='list' を入力してサポートされているモデルを表示
cli.welcome-switch-command='model <name>' を入力してモデルを切り替え
cli.welcome-lang-command='lang <code>' を入力して言語を切り替え (en/zh/ja/fr/zh_tw)
