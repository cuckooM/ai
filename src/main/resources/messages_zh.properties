# General
application.name=Spring AI 多模型聊天

# Error messages
error.api-key-missing=缺少 API 密钥配置。请在 application.yaml 中配置 spring.ai.{0}.api-key
error.base-url-missing=缺少 API 基础 URL 配置。请在 application.yaml 中配置 spring.ai.{0}.base-url
error.unsupported-model=不支持的模型: {0}
error.runtime-error=运行时错误: {0}
error.read-input-error=读取输入时出错: {0}

# Chat controller
error.chat-api.request-message-required=消息内容不能为空

# Demo runner
demorunner.error.no-chatclient-found=错误: 未找到可用的 ChatClient Bean。请确保已正确配置 API 密钥和模型配置。
demorunner.error.unsupported-model=不支持的模型: {0}
demorunner.warning.model-not-found=警告: 未找到模型 '{0}'，使用默认模型
demorunner.info.non-interactive-environment=提示: 检测到非交互式环境，建议使用 REST API 而非命令行交互
demorunner.info.exit=再见!
demorunner.info.model-switched=已切换到: {0}
demorunner.info.language-switched=语言已切换到: {0}

# Commands
command.list-header=支持的模型:
command.help-header=支持的命令:
command.help.exit=exit - 退出程序
command.help.list=/list - 显示支持的模型列表
command.help.help=/help 或 /? - 显示此帮助信息
command.help.model=model <name> - 切换模型（例如: model qwen）
command.help.lang=lang <code> - 切换语言（例如: lang en）

# Model display names
model.deepseek=DeepSeek
model.qwen=通义千问 (Qwen)
model.qwen3-coder-next=通义千问3 代码专家 (Qwen3 Coder Next)
model.default=默认

# CLI prompt
cli.prompt=>
cli.input-prompt=请输入你的消息：
cli.exit=exit
cli.list=list
cli.model-switch=model
cli.lang-switch=lang

# CLI welcome message
cli.welcome-title=== Spring AI 对话演示 ===
cli.welcome-model=使用的模型:
cli.welcome-exit-command=输入 'exit' 退出程序
cli.welcome-list-command=输入 'list' 查看支持的模型
cli.welcome-switch-command=输入 'model <name>' 切换模型
cli.welcome-lang-command=输入 'lang <code>' 切换语言（en/zh/ja/fr/zh_tw）
