# General
application.name=Spring AI 多模型聊天

# Error messages
error.api-key-missing=缺少 API 密鑰配置。請在 application.yaml 中配置 spring.ai.{0}.api-key
error.base-url-missing=缺少 API 基礎 URL 配置。請在 application.yaml 中配置 spring.ai.{0}.base-url
error.unsupported-model=不支援的模型: {0}
error.runtime-error=執行階段錯誤: {0}
error.read-input-error=讀取輸入時發生錯誤: {0}

# Chat controller
error.chat-api.request-message-required=訊息內容不能為空

# Demo runner
demorunner.error.no-chatclient-found=錯誤: 未找到可用的 ChatClient Bean。請確保已正確配置 API 密鑰和模型配置。
demorunner.error.unsupported-model=不支援的模型: {0}
demorunner.warning.model-not-found=警告: 未找到模型 '{0}'，使用預設模型
demorunner.info.non-interactive-environment=提示: 檢測到非互動式環境，建議使用 REST API 而非命令列互動
demorunner.info.exit=再見!
demorunner.info.model-switched=已切換到: {0}
demorunner.info.language-switched=語言已切換到: {0}

# Commands
command.list-header=支援的模型:
command.help-header=支援的命令:
command.help.exit=exit - 離開程式
command.help.list=/list - 顯示支援的模型列表
command.help.help=/help 或 /? - 顯示此幫助資訊
command.help.model=model <name> - 切換模型（例如: model qwen）
command.help.lang=lang <code> - 切換語言（例如: lang en）

# Model display names
model.deepseek=DeepSeek
model.qwen=通義千問 (Qwen)
model.qwen3-coder-next=通義千問3 代碼專家 (Qwen3 Coder Next)
model.default=預設

# CLI prompt
cli.prompt=>
cli.input-prompt=請輸入您的訊息：
cli.exit=exit
cli.list=list
cli.model-switch=model
cli.lang-switch=lang

# CLI welcome message
cli.welcome-title=== Spring AI 對話演示 ===
cli.welcome-model=使用的模型:
cli.welcome-exit-command=輸入 'exit' 退出程式
cli.welcome-list-command=輸入 'list' 查看支援的模型列表
cli.welcome-switch-command=輸入 'model <name>' 切換模型
cli.welcome-lang-command=輸入 'lang <code>' 切換語言（en/zh/ja/fr/zh_tw）
